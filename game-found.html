<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Found!</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      height: 180px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.22), transparent 55%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 50%),
        linear-gradient(160deg, #071120, #0e2236);
      color: #f3f4f6;
      font-family: "Aptos", "Trebuchet MS", "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
    }

    .icon {
      font-size: 38px;
      line-height: 1;
      filter: drop-shadow(0 0 14px rgba(34, 197, 94, 0.6));
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5)); }
      50%       { transform: scale(1.12); filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.9)); }
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #bbf7d0;
      text-shadow: 0 0 18px rgba(34, 197, 94, 0.45);
    }

    .sub {
      font-size: 12px;
      color: #7dd3fc;
      opacity: 0.85;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="icon">🎮</div>
  <div>
    <p class="title">Game Found!</p>
    <p class="sub">Joining now…</p>
  </div>
  <script src="game-found.js"></script>
</body>
</html>
